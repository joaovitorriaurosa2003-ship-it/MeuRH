function calcularPerfilComportamental(respostasIndices) {
  const pontos = {
    aguia: 0,
    golfinho: 0,
    lobo: 0,
    tubarao: 0
  };
  respostasIndices.forEach((opcaoIdx, perguntaIdx) => {
    const pergunta = PERGUNTAS_PERFIL_COMPORTAMENTAL[perguntaIdx];
    if (!pergunta) return;
    const opcao = pergunta.opcoes[opcaoIdx];
    if (opcao) pontos[opcao.perfil] += 1;
  });
  const perfilDominante = Object.entries(pontos).sort((a, b) => b[1] - a[1])[0][0];
  return {
    pontos,
    perfilDominante
  };
}
