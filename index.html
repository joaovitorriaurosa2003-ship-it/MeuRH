<style>
  :root {
    --bg: #f4f3f1;
    --surface: #ffffff;
    --ink: #1f1d1a;
    --ink-soft: #6b675f;
    --line: #e3e0da;
    --accent: #2e2b28;
    --gold: #b8976a;
    --gold-soft: #f3ead9;
    --success: #4a7c59;
    --danger: #b3543e;
    --radius: 10px;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); }
  #root { min-height: 100vh; }

  .shell { display: flex; min-height: 100vh; }
  .sidebar {
    width: 230px; background: var(--accent); color: #f4f1ea;
    padding: 24px 16px; display: flex; flex-direction: column; gap: 6px;
    flex-shrink: 0;
  }
  .sidebar .brand { font-size: 17px; font-weight: 600; margin-bottom: 24px; letter-spacing: 0.3px; color: var(--gold); }
  .nav-btn {
    text-align: left; background: transparent; border: none; color: #e8e4dc;
    padding: 11px 14px; border-radius: var(--radius); cursor: pointer; font-size: 14.5px;
    display: flex; align-items: center; gap: 10px; transition: background .15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.08); }
  .nav-btn.active { background: var(--gold); color: #2e2b28; font-weight: 600; }
  .nav-spacer { flex: 1; }
  .logout-btn {
    background: transparent; border: 1px solid rgba(255,255,255,0.2); color: #cfc9bd;
    padding: 9px 14px; border-radius: var(--radius); cursor: pointer; font-size: 13px;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.08); }

  .main { flex: 1; padding: 32px 40px; max-width: 1200px; }
  .page-title { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
  .page-sub { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 28px; }

  .card {
    background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
    padding: 20px 22px; margin-bottom: 18px;
  }
  .kpi-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .kpi-card {
    flex: 1; min-width: 160px; background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 16px 18px;
  }
  .kpi-label { font-size: 12px; color: var(--ink-soft); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .kpi-value { font-size: 26px; font-weight: 700; color: var(--accent); }

  .btn {
    background: var(--accent); color: #fff; border: none; padding: 10px 18px;
    border-radius: var(--radius); cursor: pointer; font-size: 14px; font-weight: 600;
    display: inline-flex; align-items: center; gap: 8px; transition: opacity .15s;
  }
  .btn:hover { opacity: 0.88; }
  .btn.gold { background: var(--gold); color: #2e2b28; }
  .btn.outline { background: transparent; color: var(--accent); border: 1px solid var(--line); }
  .btn.danger { background: var(--danger); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.small { padding: 6px 12px; font-size: 12.5px; }

  .toggle-group { display: inline-flex; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
  .toggle-group button {
    border: none; background: var(--surface); padding: 8px 16px; cursor: pointer; font-size: 13.5px; color: var(--ink-soft);
  }
  .toggle-group button.active { background: var(--accent); color: #fff; font-weight: 600; }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th { text-align: left; padding: 10px 12px; border-bottom: 2px solid var(--line); color: var(--ink-soft); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; }
  td { padding: 11px 12px; border-bottom: 1px solid var(--line); }
  tr:hover td { background: #faf9f7; }

  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11.5px; font-weight: 600; }
  .badge.pendente { background: #fbe9d9; color: #a35d1f; }
  .badge.concluida { background: #dcebe0; color: var(--success); }

  .input, select, textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: var(--radius);
    font-size: 14px; background: #fff; color: var(--ink); font-family: inherit;
  }
  .input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--ink-soft); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex;
    align-items: center; justify-content: center; z-index: 50; padding: 20px;
  }
  .modal {
    background: #fff; border-radius: 16px; padding: 28px 30px; width: 100%; max-width: 460px;
    max-height: 88vh; overflow-y: auto;
  }
  .modal h3 { margin: 0 0 18px; font-size: 18px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 22px; }

  .link-box {
    background: var(--gold-soft); border: 1px solid #e6d4b5; border-radius: var(--radius);
    padding: 12px 14px; font-size: 13px; word-break: break-all; display: flex; align-items: center; gap: 10px; justify-content: space-between;
  }

  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { background: #fff; padding: 40px; border-radius: 16px; width: 100%; max-width: 380px; border: 1px solid var(--line); }
  .login-card h2 { margin: 0 0 6px; }
  .login-card p { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 26px; }
  .error-text { color: var(--danger); font-size: 13px; margin-top: 10px; }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--ink-soft); }

  .public-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; background: var(--bg); }
  .public-card { background: #fff; padding: 36px; border-radius: 16px; width: 100%; max-width: 480px; border: 1px solid var(--line); }
  .public-card h2 { margin: 0 0 6px; }
  .public-card .company-name { color: var(--gold); font-weight: 700; }
  .question-block { margin-bottom: 22px; }
  .question-block label { font-weight: 600; font-size: 14.5px; display: block; margin-bottom: 10px; }
  .scale-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .scale-opt {
    flex: 1; min-width: 44px; text-align: center; padding: 10px 0; border: 1px solid var(--line);
    border-radius: 8px; cursor: pointer; font-size: 13.5px; background: #fff;
  }
  .scale-opt.selected { background: var(--accent); color: #fff; border-color: var(--accent); }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 18px; align-items: center; flex-wrap: wrap; }

  .spinner-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
</style>
