function slugify(text) {
  return text.toString().normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim().replace(/[^a-z0-9\s-]/g, '').replace(/\s+/g, '-').replace(/-+/g, '-');
}
function formatDate(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('pt-BR', {
    day: '2-digit',
    month: '2-digit',

  });
}
function formatDateTime(ts) {

function calcularPerfil(escolhas) {
  const pontos = {
    aguia: 0,
    golfinho: 0,
    lobo: 0,
    tubarao: 0
  };
  escolhas.forEach((opcaoIdx, pergIdx) => {
    const op = PERGUNTAS_PERFIL[pergIdx]?.opcoes[opcaoIdx];
    if (op) pontos[op.perfil] += 1;
  });
  // % proporcional: pontos / total de perguntas × 100
  const totalPerguntas = escolhas.length || 10;
  const pct = {};
  Object.keys(pontos).forEach(k => {
    pct[k] = Math.round(pontos[k] / totalPerguntas * 100);
  });
  const dominante = Object.entries(pontos).sort((a, b) => b[1] - a[1])[0][0];
  return {
    pontos,
    pct,
    dominante
  };
}

/* ============== GERAÇÃO DE PDF ============== */
function radarSVG(pct, size) {
  size = size || 190;
  var cx = size / 2,
    cy = size / 2,
    r = size * 0.36;
  var perfisOrdem = ['aguia', 'golfinho', 'lobo', 'tubarao'];
  var labels = ['Águia', 'Golfinho', 'Lobo', 'Tubarão'];
  var emojis = ['🦅', '🐬', '🐺', '🦈'];
  var cores = ['#7B5FC4', '#2E9CCA', '#5A9B72', '#E05C4A'];
  var n = 4;
  var angBase = -Math.PI / 2;
  var pts = perfisOrdem.map(function (k, i) {
    var ang = angBase + 2 * Math.PI * i / n;
    var val = (pct[k] || 0) / 100;
    return {
      x: cx + r * val * Math.cos(ang),
      y: cy + r * val * Math.sin(ang),
      ang: ang
    };
  });
  var grades = [0.25, 0.5, 0.75, 1].map(function (frac) {
    var gpts = perfisOrdem.map(function (_, i) {
      var ang = angBase + 2 * Math.PI * i / n;
      return (cx + r * frac * Math.cos(ang)).toFixed(1) + ',' + (cy + r * frac * Math.sin(ang)).toFixed(1);
    }).join(' ');
    return '<polygon points="' + gpts + '" fill="none" stroke="#ddd" stroke-width="0.5"/>';
  }).join('');
  var eixos = perfisOrdem.map(function (_, i) {
    var ang = angBase + 2 * Math.PI * i / n;
    return '<line x1="' + cx.toFixed(1) + '" y1="' + cy.toFixed(1) + '" x2="' + (cx + r * Math.cos(ang)).toFixed(1) + '" y2="' + (cy + r * Math.sin(ang)).toFixed(1) + '" stroke="#ccc" stroke-width="0.8"/>';
  }).join('');
  var area = '<polygon points="' + pts.map(function (p) {
    return p.x.toFixed(1) + ',' + p.y.toFixed(1);
  }).join(' ') + '" fill="#b8976a33" stroke="#b8976a" stroke-width="2"/>';
  var pontos = pts.map(function (p, i) {
    return '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="4" fill="' + cores[i] + '"/>';
  }).join('');
  var labelOff = 26;
  var labelsHTML = perfisOrdem.map(function (_, i) {
    var ang = angBase + 2 * Math.PI * i / n;
    var lx = cx + (r + labelOff) * Math.cos(ang);
    var ly = cy + (r + labelOff) * Math.sin(ang);
    var anchor = Math.cos(ang) > 0.1 ? 'start' : Math.cos(ang) < -0.1 ? 'end' : 'middle';
    return '<text x="' + lx.toFixed(1) + '" y="' + ly.toFixed(1) + '" text-anchor="' + anchor + '" dominant-baseline="middle" font-size="9" fill="#555" font-family="Arial">' + emojis[i] + ' ' + labels[i] + '</text>';
  }).join('');
  var pctLabels = pts.map(function (p, i) {
    var k = perfisOrdem[i];
    var v = pct[k] || 0;
    if (!v) return '';
    var ang = angBase + 2 * Math.PI * i / n;
    var ox = 10 * Math.cos(ang),
      oy = 10 * Math.sin(ang);
    return '<text x="' + (p.x + ox).toFixed(1) + '" y="' + (p.y + oy).toFixed(1) + '" text-anchor="middle" font-size="8" fill="' + cores[i] + '" font-weight="bold" font-family="Arial">' + v + '%</text>';
  }).join('');
  return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '" xmlns="http://www.w3.org/2000/svg">' + grades + eixos + area + pontos + labelsHTML + pctLabels + '</svg>';
}
