function slugify(text) {
  return text.toString().normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim().replace(/[^a-z0-9\s-]/g,'').replace(/\s+/g,'-').replace(/-+/g,'-');
}
function formatDate(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function formatDateTime(ts) {
  if (!ts) return '-';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// Calcula score médio de uma subescala dado objeto de respostas {0:val, 1:val, ...} (índice 0-based)
function calcCopsoqSubescala(respostas, subescala) {
  const vals = subescala.itens.map(n => respostas[n-1]).filter(v => v !== undefined && v !== null);
  if (!vals.length) return null;
  const media = vals.reduce((a,b) => a+b, 0) / vals.length;
  return Math.round(media * 10) / 10;
}

function calcularPerfil(escolhas) {
  const pontos={aguia:0,golfinho:0,lobo:0,tubarao:0};
  escolhas.forEach((opcaoIdx,pergIdx)=>{const op=PERGUNTAS_PERFIL[pergIdx]?.opcoes[opcaoIdx];if(op)pontos[op.perfil]+=1;});
  const totalPerguntas=escolhas.length||10;
  const pct={};Object.keys(pontos).forEach(k=>{pct[k]=Math.round(pontos[k]/totalPerguntas*100);});
  const dominante=Object.entries(pontos).sort((a,b)=>b[1]-a[1])[0][0];
  return{pontos,pct,dominante};
}

function radarSVG(pct,size){size=size||190;var cx=size/2,cy=size/2,r=size*0.36;var perfisOrdem=['aguia','golfinho','lobo','tubarao'];var labels=['Águia','Golfinho','Lobo','Tubarão'];var emojis=['🦅','🐬','🐺','🦈'];var cores=['#7B5FC4','#2E9CCA','#5A9B72','#E05C4A'];var n=4;var angBase=-Math.PI/2;var pts=perfisOrdem.map(function(k,i){var ang=angBase+2*Math.PI*i/n;var val=(pct[k]||0)/100;return{x:cx+r*val*Math.cos(ang),y:cy+r*val*Math.sin(ang),ang:ang};});var grades=[0.25,0.5,0.75,1].map(function(frac){var gpts=perfisOrdem.map(function(_,i){var ang=angBase+2*Math.PI*i/n;return(cx+r*frac*Math.cos(ang)).toFixed(1)+','+(cy+r*frac*Math.sin(ang)).toFixed(1);}).join(' ');return'<polygon points="'+gpts+'" fill="none" stroke="#ddd" stroke-width="0.5"/>';}).join('');var eixos=perfisOrdem.map(function(_,i){var ang=angBase+2*Math.PI*i/n;return'<line x1="'+cx.toFixed(1)+'" y1="'+cy.toFixed(1)+'" x2="'+(cx+r*Math.cos(ang)).toFixed(1)+'" y2="'+(cy+r*Math.sin(ang)).toFixed(1)+'" stroke="#ccc" stroke-width="0.8"/>';}).join('');var area='<polygon points="'+pts.map(function(p){return p.x.toFixed(1)+','+p.y.toFixed(1);}).join(' ')+'" fill="#b8976a33" stroke="#b8976a" stroke-width="2"/>';var pontos=pts.map(function(p,i){return'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="4" fill="'+cores[i]+'"/>';}).join('');var labelOff=26;var labelsHTML=perfisOrdem.map(function(_,i){var ang=angBase+2*Math.PI*i/n;var lx=cx+(r+labelOff)*Math.cos(ang);var ly=cy+(r+labelOff)*Math.sin(ang);var anchor=Math.cos(ang)>0.1?'start':Math.cos(ang)<-0.1?'end':'middle';return'<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="'+anchor+'" dominant-baseline="middle" font-size="9" fill="#555" font-family="Arial">'+emojis[i]+' '+labels[i]+'</text>';}).join('');var pctLabels=pts.map(function(p,i){var k=perfisOrdem[i];var v=pct[k]||0;if(!v)return'';var ang=angBase+2*Math.PI*i/n;var ox=10*Math.cos(ang),oy=10*Math.sin(ang);return'<text x="'+(p.x+ox).toFixed(1)+'" y="'+(p.y+oy).toFixed(1)+'" text-anchor="middle" font-size="8" fill="'+cores[i]+'" font-weight="bold" font-family="Arial">'+v+'%</text>';}).join('');return'<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg">'+grades+eixos+area+pontos+labelsHTML+pctLabels+'</svg>';}

function gerarPDFCopsoq(tarefa, respostas, empresaNome) {
  var dataHoje = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  // Calcular médias por subescala para o grupo
  var subescalasData = COPSOQ_SUBESCALAS.map(function(sub) {
    var scores = respostas.map(function(r) { return calcCopsoqSubescala(r.respostas||{}, sub); }).filter(function(v){return v!==null;});
    var media = scores.length ? (scores.reduce(function(a,b){return a+b;},0)/scores.length) : null;
    return Object.assign({}, sub, { media: media, n: scores.length });
  });

  var categorias = [
    {label:'Exigências',  cor:'#E05C4A', ids:['exig_quant','exig_cogn','exig_emoc']},
    {label:'Organização do Trabalho', cor:'#5A9B72', ids:['autonomia','previsib','clareza']},
    {label:'Relações',    cor:'#7B5FC4', ids:['reconhec','lideranca','apoio','justica']},
    {label:'Valores',     cor:'#b8976a', ids:['autoefic','significado','comprometim','satisfacao','inseguranca']},
    {label:'Saúde e Bem-estar', cor:'#2980b9', ids:['saude','conf_familia','sono','burnout','estresse']},
    {label:'Violência',   cor:'#922b21', ids:['violencia']},
  ];

  function barColor(v, inverter) {
    if (v===null) return '#ccc';
    if (!inverter) return v>=4?'#27ae60':v>=3?'#f39c12':'#e74c3c';
    return v<=2?'#27ae60':v<=3?'#f39c12':'#e74c3c';
  }

  var catSections = categorias.map(function(cat) {
    var rows = cat.ids.map(function(id) {
      var sub = subescalasData.find(function(s){return s.id===id;});
      if (!sub) return '';
      var v = sub.media;
      var pct = v !== null ? Math.round((v/5)*100) : 0;
      var cor = barColor(v, sub.inverter);
      return '<tr style="border-bottom:1px solid #f0ede8">'

  var html='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>COPSOQ II · '+tarefa.titulo+'</title>'
    +'<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:13px;color:#1f1d1a;padding:32px 40px}'
    +'.header{border-bottom:3px solid #b8976a;padding-bottom:14px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:flex-end}'

  var w=window.open('','_blank');

function ModalNovaTarefa({empresas,onClose}){
  const [titulo,setTitulo]=useState('');const [tipo,setTipo]=useState('Clima Organizacional');const [companyId,setCompanyId]=useState(empresas[0]?.id||'');const [saving,setSaving]=useState(false);
  const [fase,setFase]=useState('meta'); // 'meta' | 'builder'
  const [campos,setCampos]=useState([]); // para formulário personalizado

  const handleSaveMeta=()=>{
    if(!titulo.trim()||!companyId)return;
    if(tipo==='Formulário Personalizado'){setFase('builder');return;}
    handleSaveFinal();
  };
  const [erroSave,setErroSave]=useState('');

  const handleSaveFinal=async(camposFinais)=>{
    setSaving(true);setErroSave('');
    try{
      const ehPerfil=tipo==='Perfil Comportamental';
      const ehCopsoq=tipo==='Riscos Psicossociais (COPSOQ II)';
      const ehForm=tipo==='Formulário Personalizado';
      // Sanitizar campos — remover undefined que o Firestore rejeita
      const camposLimpos=(camposFinais||[]).map(c=>{
        const obj={id:c.id,tipo:c.tipo,pergunta:c.pergunta||'',obrigatorio:c.obrigatorio!==false};
        if(c.tipo==='multipla')obj.opcoes=c.opcoes||[];
        if(c.tipo==='barra'){obj.min=c.min??0;obj.max=c.max??100;if(c.rotulo)obj.rotulo=c.rotulo;}
        return obj;
      });
      await db.collection('tasks').add({
        titulo:titulo.trim(),tipo,companyId,status:'pendente',
        formato:ehPerfil?'perfil_comportamental':ehCopsoq?'copsoq2':ehForm?'formulario':'escala',
        campos:ehForm?camposLimpos:null,
        perguntas:ehPerfil?PERGUNTAS_PERFIL:ehCopsoq?COPSOQ_QUESTOES:ehForm?null:PERGUNTAS_PADRAO,
        dataCriacao:firebase.firestore.FieldValue.serverTimestamp()
      });
      setSaving(false);onClose();
    }catch(e){
      setSaving(false);
      setErroSave('Erro ao salvar: '+(e.message||e.code||'verifique as regras do Firestore'));

// Tela de login/cadastro do colaborador
function AuthColaborador({empresa,onAutenticado}){
  const [modo,setModo]=useState('login'); // 'login' | 'cadastro'
  const [email,setEmail]=useState('');
  const [senha,setSenha]=useState('');
  const [confirmaSenha,setConfirmaSenha]=useState('');
  const [erro,setErro]=useState('');
  const [loading,setLoading]=useState(false);

  const handleLogin=async()=>{
    if(!email.trim()||!senha)return;
    setErro('');setLoading(true);
    try{
      const cred=await auth.signInWithEmailAndPassword(email.trim(),senha);
      // Verificar se este usuário pertence a esta empresa
      const doc=await db.collection('employees').doc(cred.user.uid).get();
      if(!doc.exists||doc.data().companyId!==empresa.id){
        await auth.signOut();
        setErro('Esta conta não pertence a '+empresa.nome+'. Verifique o link de acesso.');
        setLoading(false);return;
      }
      onAutenticado(cred.user,doc.data());
    }catch(e){
      if(e.code==='auth/user-not-found'||e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')setErro('E-mail ou senha incorretos.');
      else setErro('Erro ao entrar. Tente novamente.');
    }
    setLoading(false);
  };

  const handleCadastro=async()=>{
    if(!email.trim()||!senha||senha!==confirmaSenha){setErro(senha!==confirmaSenha?'As senhas não coincidem.':'Preencha todos os campos.');return;}
    if(senha.length<6){setErro('A senha precisa ter pelo menos 6 caracteres.');return;}
    setErro('');setLoading(true);
    try{
      // Verificar se já existe um employee com esse email nessa empresa
      const existente=await db.collection('employees').where('email','==',email.trim().toLowerCase()).where('companyId','==',empresa.id).get();
      if(!existente.empty){setErro('Já existe uma conta com este e-mail nesta empresa.');setLoading(false);return;}
      const cred=await auth.createUserWithEmailAndPassword(email.trim(),senha);
      // Criar documento base do employee (perfil incompleto)
      await db.collection('employees').doc(cred.user.uid).set({
        email:email.trim().toLowerCase(),companyId:empresa.id,
        perfilCompleto:false,ativo:true,dataCadastro:firebase.firestore.FieldValue.serverTimestamp()
      });
      onAutenticado(cred.user,{email:email.trim().toLowerCase(),companyId:empresa.id,perfilCompleto:false,ativo:true});
    }catch(e){
      if(e.code==='auth/email-already-in-use')setErro('Já existe uma conta com este e-mail. Faça login.');

    React.createElement("div",{style:{width:'100%',maxWidth:400}},
      // Cabeçalho
      React.createElement("div",{style:{textAlign:'center',marginBottom:28}},
        React.createElement("div",{style:{fontSize:12,color:'#b8976a',fontWeight:700,letterSpacing:2,marginBottom:16}},"INSTITUTO PROPAGARE"),
        React.createElement("div",{style:{fontSize:44,marginBottom:12}},"🏢"),
        React.createElement("h2",{style:{color:'#1a1d2e',fontSize:22,margin:'0 0 4px',fontWeight:800}},empresa.nome),
        React.createElement("p",{style:{color:'#6b7280',fontSize:13,margin:0}},"Portal do Colaborador")
      ),
      // Toggle login/cadastro
      React.createElement("div",{style:{display:'flex',background:'#e2e5ec',borderRadius:10,padding:3,marginBottom:20}},
        ['login','cadastro'].map(m=>React.createElement("button",{key:m,onClick:()=>{setModo(m);setErro('');},style:{flex:1,background:modo===m?'#fff':'transparent',border:'none',borderRadius:8,padding:'9px',cursor:'pointer',fontSize:13,fontWeight:modo===m?700:400,color:modo===m?'#1a1d2e':'#6b7280',transition:'all .15s'}},m==='login'?'Entrar':'Criar conta'))
      ),
      // Campos
      React.createElement("label",{style:{display:'block',fontSize:11,color:'#6b7280',fontWeight:600,textTransform:'uppercase',marginBottom:5}},"E-mail"),
      React.createElement("input",{value:email,onChange:e=>setEmail(e.target.value),type:"email",placeholder:"seu@email.com",style:inp,autoFocus:true,onKeyDown:e=>e.key==='Enter'&&(modo==='login'?handleLogin():null)}),

// Tela de completar perfil (após primeiro cadastro)
function CompletarPerfil({user,empresa,onConcluido}){
  const [nome,setNome]=useState('');
  const [cargo,setCargo]=useState('');
  const [sexo,setSexo]=useState('');
  const [saving,setSaving]=useState(false);
  const [erro,setErro]=useState('');

  const handleSalvar=async()=>{
    if(!nome.trim()||!cargo.trim()||!sexo)return;
    setSaving(true);setErro('');
    try{
      const data={
        nome:nome.trim(),cargo:cargo.trim(),sexo,
        perfilCompleto:true,ativo:true,
        companyId:empresa.id,
        email:user.email||'',
        updatedAt:firebase.firestore.FieldValue.serverTimestamp()
      };
      // set com merge garante que funciona mesmo se o doc não existir ainda
      await db.collection('employees').doc(user.uid).set(data,{merge:true});
      setSaving(false);
      onConcluido(data);
    }catch(e){
      setSaving(false);
      setErro('Erro ao salvar: '+e.message+'. Tente novamente.');
    }
  };

  const inp={width:'100%',background:'#fff',border:'1px solid #e2e5ec',borderRadius:12,padding:'14px 16px',color:'#1a1d2e',fontSize:15,fontFamily:'inherit',outline:'none',marginBottom:14,boxSizing:'border-box'};

    React.createElement("label",{style:{fontSize:11,color:'#6b7280',fontWeight:600,textTransform:'uppercase',display:'block',marginBottom:5}},"Nome completo"),
    React.createElement("input",{value:nome,onChange:e=>setNome(e.target.value),placeholder:"Como você se chama?",style:inp,autoFocus:true}),

      React.createElement("p",{style:{color:'#1a1d2e',fontSize:15,margin:'0 0 14px',lineHeight:1.5,fontWeight:600}},idx+1,". ",pergTexto),
      React.createElement("div",{style:{display:'flex',gap:8}},[1,2,3,4,5].map(v=>React.createElement("button",{key:v,onClick:()=>setRespostas(r=>({...r,[idx]:v})),style:{flex:1,background:respostas[idx]===v?'#b8976a':'#f8f9fb',color:respostas[idx]===v?'#fff':'#888',border:`1px solid ${respostas[idx]===v?'#b8976a':'#e2e5ec'}`,borderRadius:10,padding:'12px 0',fontSize:16,fontWeight:700,cursor:'pointer'}},v))),

function App(){
  const [user,setUser]=useState(undefined);
  const params=new URLSearchParams(window.location.search);
  const empresaSlug=params.get('empresa');
  const isColaborador=params.has('colaborador');
  const salaCode=params.get('sala');

  useEffect(()=>{
    // Injetar CSS mobile quando no portal do colaborador
    if(isColaborador){
      document.title='Portal do Colaborador · Propagare';
      const meta=document.querySelector('meta[name=theme-color]')||document.createElement('meta');
      meta.name='theme-color';meta.content='#f5f6fa';document.head.appendChild(meta);
      // CSS mobile-first dedicado
      const style=document.createElement('style');
      style.id='mobile-portal-css';
      style.textContent=`
        body{background:#f5f6fa!important;-webkit-tap-highlight-color:transparent;}
        *{-webkit-font-smoothing:antialiased;}
        input,textarea,select,button{font-family:'Segoe UI',system-ui,sans-serif;}
        button:active{transform:scale(.97);}
        input[type=range]{-webkit-appearance:none;appearance:none;height:8px;border-radius:4px;background:#e2e5ec;outline:none;}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:24px;height:24px;border-radius:50%;background:#2563eb;cursor:pointer;box-shadow:0 2px 6px rgba(37,99,235,.4);}
        input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:#2563eb;cursor:pointer;border:none;box-shadow:0 2px 6px rgba(37,99,235,.4);}
        @media(max-width:480px){
          body{font-size:15px;}
        }
      `;
      document.head.appendChild(style);
    }
  },[isColaborador]);

  useEffect(()=>{const unsub=auth.onAuthStateChanged(u=>setUser(u));return unsub;},[]);

  // Portal do colaborador — detecta tanto ?colaborador&empresa=slug quanto ?empresa=slug (legacy)
  if(isColaborador&&empresaSlug)return React.createElement(FluxoPublico,{slug:empresaSlug});
  // Legacy: link antigo sem ?colaborador — redireciona para nova URL
  if(!isColaborador&&empresaSlug){
    const novaUrl=window.location.pathname+'?colaborador&empresa='+empresaSlug;
    window.history.replaceState({},'',novaUrl);
    return React.createElement(FluxoPublico,{slug:empresaSlug});
  }
  if(user===undefined)return React.createElement("div",{style:{minHeight:'100vh',background:'#f8f9fb',display:'flex',alignItems:'center',justifyContent:'center'}},React.createElement("div",{style:{color:'#b8976a'}},"Carregando..."));
  if(!user)return React.createElement(LoginScreen,null);
  return React.createElement(PainelAdmin,{user});
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App,null));
</script>
